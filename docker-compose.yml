# Temporal dev server runs locally via CLI (not containerized).
# Start it first: temporal server start-dev
#
# Then: docker compose up --build

services:
  # ── Backend API (FastAPI) ──
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "8000:8000"
    environment:
      - TEMPORAL_ADDRESS=host.docker.internal:7233
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Worker (Python — default) ──
  worker-python:
    build:
      context: .
      dockerfile: docker/worker-python.Dockerfile
    environment:
      - TEMPORAL_ADDRESS=host.docker.internal:7233
      - DEJAVU_BACKEND_URL=http://backend:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend

  # ── Worker (Java — future) ──
  # worker-java:
  #   build:
  #     context: .
  #     dockerfile: workflows/java/Dockerfile
  #   environment:
  #     - TEMPORAL_ADDRESS=host.docker.internal:7233
  #     - DEJAVU_BACKEND_URL=http://backend:8000
  #   extra_hosts:
  #     - "host.docker.internal:host-gateway"
  #   depends_on:
  #     - backend
  #   profiles:
  #     - java

  # ── Frontend (nginx + static build) ──
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
